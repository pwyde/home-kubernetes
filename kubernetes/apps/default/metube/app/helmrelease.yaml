---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app metube
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.2.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      metube:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          metube:
            image:
              repository: ghcr.io/alexta69/metube
              tag: "2024-06-07@sha256:fbd4a47410aac4ce322eb655404c112cadb919418e0952a1a2836eb9c366ccea"
            env:
              TZ: ${TIMEZONE}
              UID: 1000
              GID: 4000
              DARK_MODE: true
              DOWNLOAD_DIRS_INDEXABLE: true
              DOWNLOAD_DIR: /mnt/media/Downloads/YouTube/
              # Path to where the queue persistence files will be saved.
              STATE_DIR: /data
              # Path where intermediary download files will be saved. Set this to an SSD or RAM file-
              # system (i.e. tmpfs) for better performance.
              TEMP_DIR: /tmp
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8081
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: &host metube.${SECRET_DOMAIN}
          className: internal
        hosts:
          - host: *host
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
    persistance:
      # data:
      #   existingClaim: data-metube
      #   globalMounts:
      #     - path: /data
      # tmp:
      #   type: emptyDir
      #   globalMounts:
      #     - path: /tmp
      downloads:
        type: nfs
        server: ${TRUENAS_IP}
        path: ${NFS_PATH_MEDIA}
        globalMounts:
          - path: /mnt/media
            readOnly: false

